<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparatore Orto-Reumato V2</title>

<style>
:root{
--bg:#0b111a;
--card:#151f2c;
--card2:#1d2a3a;
--text:#f8fafc;
--muted:#a7b0bd;
--blue:#8ecae6;
--yellow:#ffb703;
--red:#ff6b6b;
--green:#80ed99;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,sans-serif;
background:linear-gradient(180deg,#0b111a,#111827);
color:var(--text);
padding:14px;
padding-bottom:95px;
}

h1,h2,h3{margin-top:0}
p{line-height:1.45}

.card{
background:var(--card);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:18px;
margin-bottom:14px;
box-shadow:0 10px 25px rgba(0,0,0,.22);
}

.hero{
background:linear-gradient(135deg,#1d3557,#284b63);
}

.badge{
display:inline-block;
padding:5px 9px;
border-radius:999px;
font-size:12px;
margin:3px;
background:rgba(142,202,230,.15);
color:var(--blue);
}

.tierS{background:rgba(255,107,107,.18);color:#ffb3b3}
.tierA{background:rgba(255,183,3,.18);color:#ffd166}
.tierB{background:rgba(128,237,153,.16);color:#b8f7c8}

button{
border:none;
border-radius:14px;
padding:12px 14px;
margin:4px;
font-weight:800;
font-size:15px;
background:#26364a;
color:white;
}

button.primary{background:var(--blue);color:#071018}
button.warn{background:var(--yellow);color:#2a1900}
button.red{background:var(--red);color:#240808}
button.green{background:var(--green);color:#062012}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#0c141f;
border-top:1px solid rgba(255,255,255,.08);
display:grid;
grid-template-columns:repeat(7,1fr);
padding:8px 5px calc(8px + env(safe-area-inset-bottom));
z-index:10;
}

.nav button{
background:transparent;
color:var(--muted);
font-size:11px;
padding:8px 2px;
}

.nav button.active{
background:#223044;
color:white;
}

.ok{
border-left:4px solid var(--green);
padding-left:12px;
}

.killer{
border-left:4px solid var(--red);
padding-left:12px;
}

.flash{
min-height:260px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:24px;
line-height:1.35;
white-space:pre-wrap;
}

input{
width:100%;
padding:13px;
border-radius:14px;
background:#0d1520;
color:white;
border:1px solid rgba(255,255,255,.12);
font-size:16px;
margin-bottom:12px;
}

details{
background:#101923;
border-radius:15px;
padding:12px;
margin-top:8px;
}

summary{
font-weight:900;
color:var(--yellow);
}

.small{color:var(--muted);font-size:13px}

.progress{
height:12px;
background:#26364a;
border-radius:999px;
overflow:hidden;
}

.progress div{
height:100%;
background:var(--blue);
width:0%;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="nav">
<button onclick="go('home')" id="n-home">Home</button>

function getFlashPool(){
if(flashMode==="killer"){
return topics.map(t=>[t.title,t.killer,t.title]);
}
if(flashMode==="errors"){
if(errors.length===0) return [["Nessun errore salvato","Vai nel Manuale o nelle Flashcard e segna ciò che non sai.","Error Book"]];
return errors.map(e=>[e,"Ripassa questo punto e ripetilo a voce.", "Error Book"]);
}
return flashcards;
}

function setFlashMode(m){
flashMode=m;
flashIndex=0;
flipped=false;
showCard();
}

function showCard(){
let pool=getFlashPool();
let c=pool[flashIndex%pool.length];
flashMeta.innerHTML=`${flashIndex+1}/${pool.length} · ${c[2]}`;
flashBox.innerHTML=flipped?c[1]:c[0];
}

function flipCard(){
flipped=!flipped;
showCard();
}

function nextCard(){
let pool=getFlashPool();
flashIndex=(flashIndex+1)%pool.length;
flipped=false;
showCard();
}

function prevCard(){
let pool=getFlashPool();
flashIndex=(flashIndex-1+pool.length)%pool.length;
flipped=false;
showCard();
}

function markFlashError(){
let pool=getFlashPool();
let c=pool[flashIndex%pool.length];
addError(c[2]+": "+c[0]);
}

let selectedQuiz=[];
let quizIndex=0;
let quizScore=0;
let answered=false;

function quiz(){

app.innerHTML=`
<div class="card hero">
<h1>Quiz a risposta multipla</h1>
<p>Scegli una modalità. Le risposte corrette diventano verdi, quelle errate rosse. Ogni errore finisce nell'Error Book.</p>
</div>

<div class="card">
<h2>Modalità</h2>
<button class="primary" onclick="startQuiz('all')">Mix completo</button>
<button onclick="startQuiz('Ortopedia')">Ortopedia</button>
<button onclick="startQuiz('Reumatologia')">Reumatologia</button>
<button onclick="startQuiz('Farmaci')">Farmaci</button>
</div>

<div class="card">
<h2>Quiz per argomento</h2>
${[...new Set(quizBank.map(x=>x.topic))].map(t=>`
<button onclick="startQuizTopic('${t}')">${t}</button>
`).join("")}
</div>
`;

}

function shuffleArray(arr){
return arr.sort(()=>Math.random()-0.5);
}

function startQuiz(mode){

if(mode==="all"){
selectedQuiz=shuffleArray([...quizBank]);
}else{
selectedQuiz=shuffleArray(quizBank.filter(x=>x.cat===mode));
}

quizIndex=0;
quizScore=0;
answered=false;
renderQuiz();

}

function startQuizTopic(topic){

selectedQuiz=shuffleArray(quizBank.filter(x=>x.topic===topic));
quizIndex=0;
quizScore=0;
answered=false;
renderQuiz();

}

function renderQuiz(){

if(selectedQuiz.length===0){

app.innerHTML=`
<div class="card">
<h1>Nessuna domanda</h1>
<p>Non ci sono ancora domande in questa categoria.</p>
<button class="primary" onclick="quiz()">Torna ai quiz</button>
</div>
`;

return;
}

if(quizIndex>=selectedQuiz.length){

let perc=Math.round((quizScore/selectedQuiz.length)*100);

app.innerHTML=`
<div class="card hero">
<h1>Quiz completato</h1>
<h2>Punteggio: ${quizScore}/${selectedQuiz.length}</h2>
<p><b>${perc}%</b> corrette</p>
</div>

<div class="card">
<button class="primary" onclick="quiz()">Nuovo quiz</button>
<button onclick="go('errori')">Vai all'Error Book</button>
</div>
`;

return;
}

let q=selectedQuiz[quizIndex];

app.innerHTML=`
<div class="card">
<span class="badge">${q.cat}</span>
<span class="badge">${q.topic}</span>
<h1>Domanda ${quizIndex+1}/${selectedQuiz.length}</h1>
<h2>${q.q}</h2>

<div id="answers">
${q.a.map((x,i)=>`
<button id="ans-${i}" style="display:block;width:100%;text-align:left;margin-bottom:8px"
onclick="answerQuiz(${i})">
${String.fromCharCode(65+i)}. ${x}
</button>
`).join("")}
</div>

<div id="explanation"></div>
</div>
`;

}

function answerQuiz(i){

if(answered) return;

answered=true;

let q=selectedQuiz[quizIndex];

for(let k=0;k<q.a.length;k++){
let btn=document.getElementById("ans-"+k);

if(k===q.c){
btn.style.background="#80ed99";
btn.style.color="#062012";
}

if(k===i && i!==q.c){
btn.style.background="#ff6b6b";
btn.style.color="#240808";
}

}

if(i===q.c){
quizScore++;
document.getElementById("explanation").innerHTML=`
<div class="card ok">
<h2>✅ Corretta</h2>
<p>${q.exp}</p>
<button class="primary" onclick="nextQuiz()">Continua</button>
</div>
`;
}else{
addError("Quiz - "+q.topic+": "+q.q);
document.getElementById("explanation").innerHTML=`
<div class="card killer">
<h2>❌ Errata</h2>
<p>${q.exp}</p>
<p><b>Risposta corretta:</b> ${q.a[q.c]}</p>
<button class="primary" onclick="nextQuiz()">Continua</button>
</div>
`;
}

}

function nextQuiz(){

quizIndex++;
answered=false;
renderQuiz();

}
