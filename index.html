<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparatore Orto-Reumato</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0f1720;
color:white;
margin:0;
padding:20px;
}

.card{
background:#17212d;
padding:20px;
border-radius:16px;
margin-bottom:15px;
}

h1{
margin-top:0;
}

button{
padding:12px;
border:none;
border-radius:12px;
background:#8ecae6;
font-weight:bold;
width:100%;
margin-top:10px;
}

.flash{
font-size:22px;
text-align:center;
padding:40px 10px;
}
</style>

</head>
<body>

<div class="card">
<h1>Preparatore Orale Orto-Reumato</h1>
<p>Versione mobile personale.</p>
</div>

<div class="card">
<h2>Argomenti Tier S</h2>
<ul>
<li>DCA</li>
<li>Scoliosi</li>
<li>Gonartrosi</li>
<li>Artrite Reumatoide</li>
<li>Artrite Psoriasica</li>
<li>LES</li>
<li>Sclerosi Sistemica</li>
<li>Behçet</li>
</ul>
</div>

<div class="card">
<h2>Flashcard Demo</h2>

<div class="flash" id="card">
Ortolani?
</div>

<button onclick="flipCard()">
Mostra risposta
</button>

</div>

<script>

let stato=0;

function flipCard(){

if(stato===0){
document.getElementById("card").innerHTML=
"Riduce un'anca lussata";
stato=1;
}
else{
document.getElementById("card").innerHTML=
"Ortolani?";
stato=0;
}

}

</script>

</body>
</html>
